<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Certificado</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Nunito:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />

    <style>
      .cert-wrapper {
        width: 297mm;
        height: 210mm;
        margin: 40px auto;
        position: relative;
        background: linear-gradient(135deg, #4a0e82, #7b2fbe, #9c3fe0);
        color: #fff;
        overflow: hidden;
      }

      /* HEADER */
      .header {
        position: absolute;
        top: 18mm;
        left: 18mm;
        opacity: 0.6;
        font-size: 10px;
        text-transform: uppercase;
      }

      /* CENTRAL */
      .center {
        height: 100%;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        padding: 20mm;
      }

      .name {
        font-size: 34px;
        font-family: "Playfair Display";
        color: #ffd600;
        font-weight: 900;
      }

      /* FOOTER */
      .footer {
        position: absolute;
        bottom: 15mm;
        width: 100%;
        display: flex;
        justify-content: space-between;
        padding: 0 18mm;
      }

      .sig {
        text-align: center;
      }

      .line {
        width: 200px;
        height: 2px;
        background: rgba(255, 255, 255, 0.7);
        margin-bottom: 6px;
      }

      .logo img {
        height: 120px;
        object-fit: contain;
      }

      /* PRINT */
      @media print {
        @page {
          size: A4 landscape;
          margin: 0;
        }

        body {
          background: none;
        }

        .cert-wrapper {
          margin: 0;
          box-shadow: none;
        }
      }
    </style>
  </head>

  <body>
    <div class="cert-wrapper">
      <div class="header">
        Assembleia de Deus - Marizópolis PB<br />
        Treinamento Infantil
      </div>

      <div class="center">
        <div>Certificado</div>
        <div class="name" id="nome"></div>
        <p style="max-width: 600px; margin-top: 20px">
          participou e concluiu o treinamento infantil.
        </p>
      </div>

      <div class="footer">
        <div class="sig">
          <div class="line"></div>
          Pastor Local
        </div>

        <div class="logo">
          <img id="logo" />
        </div>
      </div>
    </div>

    <script>
      const id = new URLSearchParams(window.location.search).get("id");

      fetch("https://script.google.com/macros/s/AKfycby1q7-NzidTa01sQfeHObyscFsFePxYAshfJfVLUNSum4PUs6WHSldmoXn1TAAqKOdU/exec?id=" + id)
        .then((r) => r.json())
        .then((data) => {
          document.getElementById("nome").innerText = data.nome;
          document.getElementById("logo").src = data.logo;
        });
    </script>
  </body>
</html>
